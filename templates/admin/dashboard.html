{% extends "base.html" %}
{% block content %}
<h2>Admin Dashboard</h2>
<div class="row mt-4">
    <div class="col-md-3">
        <div class="card text-white bg-primary">
            <div class="card-body">
                <h5>Total Users</h5>
                <h3>{{ total_users }}</h3>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-white bg-success">
            <div class="card-body">
                <h5>Total Inward</h5>
                <h3>{{ total_inward }}</h3>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-white bg-warning">
            <div class="card-body">
                <h5>Total Outward</h5>
                <h3>{{ total_outward }}</h3>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card text-white bg-info">
            <div class="card-body">
                <h5>Activities</h5>
                <h3>{{ total_activities }}</h3>
            </div>
        </div>
    </div>
</div>
<div class="row mt-4">
    <div class="col-md-4">
        <a href="{{ url_for('manage_users') }}" class="btn btn-primary btn-lg w-100">Manage Users</a>
    </div>
    <div class="col-md-4">
        <a href="{{ url_for('reports') }}" class="btn btn-success btn-lg w-100">View Reports</a>
    </div>
</div>
{% endblock %}
